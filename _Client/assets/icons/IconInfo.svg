<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="filter: drop-shadow(1.5px 1.5px 2px rgba(0,0,0,0.4));">

  <!-- 큰 원 (좌우로 납작해지는 효과) -->
  <g id="circle-group" style="transform-origin: 12px 12px; animation: coinSpin 3.2s cubic-bezier(0.25, 0.1, 0.35, 1) infinite;">
    <circle cx="12" cy="12" r="10"></circle>
  </g>

  <!-- 느낌표 몸통 (작대기) - 올라온 후 고정 -->
  <g id="body" style="animation: rise 3.2s ease-in-out forwards;">
    <line x1="12" y1="16" x2="12" y2="12"></line>
  </g>

  <!-- 느낌표 점 (올라오는 건 1번만 + 통통 바운스는 무한 반복) -->
  <g id="dot-group" style="transform-origin: 12px 12px;">
    <line x1="12" y1="8" x2="12.01" y2="8" style="animation: riseOnce 3.2s ease-in-out forwards, bounceInfinite 1.1s ease-in-out 3.2s infinite;">
    </line>
  </g>

  <!-- 애니메이션 정의 -->
  <style>
    /* 큰 원 좌우 납작 효과 */
    @keyframes coinSpin {
      0%    { transform: rotate(0deg) scaleX(1) scaleY(1); }
      9%    { transform: rotate(0deg) scaleX(1) scaleY(1); }
      18%   { transform: rotate(0deg) scaleX(0.65) scaleY(1); }
      27%   { transform: rotate(0deg) scaleX(1) scaleY(1); }
      36%   { transform: rotate(0deg) scaleX(0) scaleY(1); }
      45%   { transform: rotate(0deg) scaleX(1) scaleY(1); }
      54%   { transform: rotate(0deg) scaleX(0.65) scaleY(1); }
      63%   { transform: rotate(0deg) scaleX(1) scaleY(1); }
      72%   { transform: rotate(0deg) scaleX(0) scaleY(1); }
      81%   { transform: rotate(0deg) scaleX(1) scaleY(1); }
      90%   { transform: rotate(0deg) scaleX(0.65) scaleY(1); }
      100%  { transform: rotate(0deg) scaleX(1) scaleY(1); }
    }

    /* 작대기 올라오기 (1번만) */
    @keyframes rise {
      0%   { transform: translateY(19px); }
      37%  { transform: translateY(0); }
      100% { transform: translateY(0); }
    }

    /* 점 올라오기 (1번만) */
    @keyframes riseOnce {
      0%   { transform: translateY(19px); }
      37%  { transform: translateY(0); }
      100% { transform: translateY(0); }
    }

    /* 점 통통 바운스 (올라온 후부터 무한 반복) */
    @keyframes bounceInfinite {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-5.4px); }
      62%      { transform: translateY(1.6px); }
      74%      { transform: translateY(-3.2px); }
      84%      { transform: translateY(0.9px); }
    }
  </style>

</svg>