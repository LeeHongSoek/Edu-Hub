<svg width="100%" viewBox="0 0 520 400" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>모두의 문풀 말풍선</title>
  <desc>여백 없이 꽉 찬 남색 말풍선</desc>
  <defs>
    <filter id="bubbleShadow" x="-15%" y="-15%" width="140%" height="150%">
      <feDropShadow dx="10" dy="14" stdDeviation="14" flood-color="#1A237E" flood-opacity="0.45"></feDropShadow>
    </filter>
    <filter id="textShadow">
      <feDropShadow dx="3" dy="3" stdDeviation="3" flood-color="#0D1B6E" flood-opacity="0.5"></feDropShadow>
    </filter>
    <clipPath id="bubbleClip">
      <rect x="0" y="0" width="460" height="240" rx="36" ry="36"></rect>
    </clipPath>
  </defs>
<g>
  <!-- 둥둥 떠다니는 애니메이션 -->
  <animateTransform
    attributeName="transform"
    type="translate"
    values="0 0; 0 -12; 0 0"
    dur="3.2s"
    repeatCount="indefinite"
  />

  <!-- 전체를 중앙 기준 15도 회전, 여백 최소화 -->
  <g transform="translate(260, 185) rotate(15) translate(-230, -120)">


    <!-- 그림자 레이어 -->
    <rect x="12" y="16" width="460" height="240" rx="36" ry="36" fill="#1A237E" opacity="0.22"></rect>
    <polygon points="115,256 175,256 145,306" fill="#1A237E" opacity="0.22"></polygon>

    <!-- 말풍선 배경 -->
    <rect x="0" y="0" width="460" height="240" rx="36" ry="36" fill="#EEF2FF" stroke="none"></rect>

    <!-- 클립 안: 시험지 + 연필 -->
    <g clip-path="url(#bubbleClip)" opacity="0.13">
      <!-- 시험지 1 왼쪽 -->
      <g transform="translate(18, 10) rotate(-8)">
        <rect x="0" y="0" width="110" height="145" rx="4" fill="none" stroke="#1A237E" stroke-width="2"></rect>
        <line x1="10" y1="22" x2="100" y2="22" stroke="#1A237E" stroke-width="2.5"></line>
        <line x1="10" y1="38" x2="100" y2="38" stroke="#1A237E" stroke-width="1.5"></line>
        <line x1="10" y1="50" x2="85" y2="50" stroke="#1A237E" stroke-width="1.5"></line>
        <line x1="10" y1="62" x2="100" y2="62" stroke="#1A237E" stroke-width="1.5"></line>
        <line x1="10" y1="74" x2="78" y2="74" stroke="#1A237E" stroke-width="1.5"></line>
        <line x1="10" y1="86" x2="100" y2="86" stroke="#1A237E" stroke-width="1.5"></line>
        <line x1="10" y1="98" x2="90" y2="98" stroke="#1A237E" stroke-width="1.5"></line>
        <line x1="10" y1="110" x2="100" y2="110" stroke="#1A237E" stroke-width="1.5"></line>
        <line x1="10" y1="122" x2="70" y2="122" stroke="#1A237E" stroke-width="1.5"></line>
        <circle cx="18" cy="46" r="5" fill="none" stroke="#1A237E" stroke-width="1.5"></circle>
        <circle cx="18" cy="70" r="5" fill="none" stroke="#1A237E" stroke-width="1.5"></circle>
        <circle cx="18" cy="94" r="5" fill="none" stroke="#1A237E" stroke-width="1.5"></circle>
        <circle cx="18" cy="118" r="5" fill="none" stroke="#1A237E" stroke-width="1.5"></circle>
      </g>

      <!-- 시험지 2 오른쪽 -->
      <g transform="translate(340, 8) rotate(6)">
        <rect x="0" y="0" width="105" height="138" rx="4" fill="none" stroke="#1A237E" stroke-width="2"></rect>
        <line x1="10" y1="20" x2="95" y2="20" stroke="#1A237E" stroke-width="2.5"></line>
        <line x1="10" y1="35" x2="95" y2="35" stroke="#1A237E" stroke-width="1.5"></line>
        <line x1="10" y1="47" x2="80" y2="47" stroke="#1A237E" stroke-width="1.5"></line>
        <line x1="10" y1="59" x2="95" y2="59" stroke="#1A237E" stroke-width="1.5"></line>
        <line x1="10" y1="71" x2="72" y2="71" stroke="#1A237E" stroke-width="1.5"></line>
        <line x1="10" y1="83" x2="95" y2="83" stroke="#1A237E" stroke-width="1.5"></line>
        <line x1="10" y1="95" x2="88" y2="95" stroke="#1A237E" stroke-width="1.5"></line>
        <line x1="10" y1="107" x2="95" y2="107" stroke="#1A237E" stroke-width="1.5"></line>
        <circle cx="17" cy="43" r="5" fill="none" stroke="#1A237E" stroke-width="1.5"></circle>
        <circle cx="17" cy="67" r="5" fill="none" stroke="#1A237E" stroke-width="1.5"></circle>
        <circle cx="17" cy="91" r="5" fill="none" stroke="#1A237E" stroke-width="1.5"></circle>
      </g>

      <!-- 연필 1 -->
      <g transform="translate(168, 120) rotate(-30)">
        <rect x="0" y="0" width="18" height="110" rx="2" fill="#1A237E"></rect>
        <rect x="0" y="-16" width="18" height="16" rx="2" fill="#3949AB"></rect>
        <rect x="0" y="-2" width="18" height="4" fill="#5C6BC0"></rect>
        <polygon points="0,110 18,110 9,135" fill="#5C6BC0"></polygon>
        <polygon points="7,135 11,135 9,145" fill="#1A237E"></polygon>
        <line x1="6" y1="0" x2="6" y2="110" stroke="#EEF2FF" stroke-width="1" opacity="0.4"></line>
        <line x1="12" y1="0" x2="12" y2="110" stroke="#EEF2FF" stroke-width="1" opacity="0.4"></line>
      </g>

      <!-- 연필 2 -->
      <g transform="translate(310, 60) rotate(20)">
        <rect x="0" y="0" width="13" height="80" rx="2" fill="#3949AB"></rect>
        <rect x="0" y="-12" width="13" height="12" rx="2" fill="#5C6BC0"></rect>
        <rect x="0" y="-2" width="13" height="3" fill="#7986CB"></rect>
        <polygon points="0,80 13,80 6.5,100" fill="#7986CB"></polygon>
        <polygon points="4.5,100 8.5,100 6.5,108" fill="#1A237E"></polygon>
        <line x1="4" y1="0" x2="4" y2="80" stroke="#EEF2FF" stroke-width="0.8" opacity="0.35"></line>
        <line x1="9" y1="0" x2="9" y2="80" stroke="#EEF2FF" stroke-width="0.8" opacity="0.35"></line>
      </g>
    </g>

    <!-- 말풍선 테두리 -->
    <rect x="0" y="0" width="460" height="240" rx="36" ry="36" fill="none" stroke="#3949AB" stroke-width="6" filter="url(#bubbleShadow)"></rect>

    <!-- 꼬리 -->
    <polygon points="115,240 175,240 145,292" fill="#EEF2FF" stroke="#3949AB" stroke-width="5.5" stroke-linejoin="round"></polygon>
    <polygon points="120,236 170,236 145,286" fill="#EEF2FF" stroke="none"></polygon>

    <!-- 내부 장식 -->
    <rect x="18" y="18" width="80" height="8" rx="4" fill="#7986CB" opacity="0.5"></rect>
    <circle cx="45" cy="55" r="5" fill="#7986CB" opacity="0.85"></circle>
    <circle cx="40" cy="55" r="2" fill="#fff" opacity="0.7"></circle>
    <circle cx="415" cy="62" r="4" fill="#5C6BC0" opacity="0.75"></circle>
    <circle cx="411" cy="62" r="1.5" fill="#fff" opacity="0.6"></circle>

    <g transform="translate(28, 218)" stroke="#3949AB" stroke-width="3" stroke-linecap="round" opacity="0.6">
      <line x1="-8" y1="0" x2="8" y2="0"></line>
      <line x1="0" y1="-8" x2="0" y2="8"></line>
    </g>
    <g transform="translate(438, 120)" stroke="#7986CB" stroke-width="2.5" stroke-linecap="round" opacity="0.65">
      <line x1="-7" y1="0" x2="7" y2="0"></line>
      <line x1="0" y1="-7" x2="0" y2="7"></line>
    </g>

    <circle cx="428" cy="200" r="16" fill="none" stroke="#5C6BC0" stroke-width="2.5" stroke-dasharray="5,4" opacity="0.45"></circle>
    <circle cx="30" cy="22" r="11" fill="none" stroke="#7986CB" stroke-width="2" stroke-dasharray="4,3" opacity="0.4"></circle>

    <!-- 텍스트: 모두의 -->
    <text x="230" y="110" text-anchor="middle" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif" font-size="62" font-weight="900" fill="#3949AB" filter="url(#textShadow)" letter-spacing="5">모두의</text>

    <!-- 텍스트: 문풀 -->
    <text x="230" y="200" text-anchor="middle" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif" font-size="90" font-weight="900" fill="#1A237E" filter="url(#textShadow)" letter-spacing="8">문풀:</text>

    <!-- 밑줄 -->
    <rect x="128" y="214" width="204" height="9" rx="4.5" fill="#5C6BC0" opacity="0.85"></rect>

  </g>
</g>  
</svg>